name: Deploy Trading Dashboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'template.yaml'
      - 'samconfig.toml'

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build and deploy Lambda functions
        run: sam build && sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

  frontend-public:
    runs-on: ubuntu-latest
    needs: backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build public frontend
        run: cd frontend && npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.PUBLIC_API_URL }}
          VITE_PORTFOLIO_MODE: synthetic

      - name: Deploy to S3
        run: aws s3 sync frontend/dist s3://trading-dashboard-public --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PUBLIC_CF_DIST_ID }} \
            --paths "/*"

  frontend-private:
    runs-on: ubuntu-latest
    needs: backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build private frontend
        run: cd frontend && npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.PRIVATE_API_URL }}
          VITE_PORTFOLIO_MODE: live
          VITE_API_KEY: ${{ secrets.PRIVATE_API_KEY }}

      - name: Deploy to S3
        run: aws s3 sync frontend/dist s3://trading-dashboard-private --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PRIVATE_CF_DIST_ID }} \
            --paths "/*"
