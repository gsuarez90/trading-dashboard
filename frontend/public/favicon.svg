<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Ears (behind head) -->
  <polygon points="8,24 15,5 27,23" fill="#E8720A"/>
  <polygon points="37,23 49,5 56,24" fill="#E8720A"/>
  <polygon points="10,23 15,9 25,22" fill="#F5A878"/>
  <polygon points="39,22 49,9 54,23" fill="#F5A878"/>

  <!-- Head -->
  <circle cx="32" cy="40" r="24" fill="#E8720A"/>

  <!-- Muzzle (lighter) -->
  <ellipse cx="32" cy="49" rx="13" ry="9" fill="#F5A050"/>

  <!-- Forehead stripes -->
  <path d="M24,21 L22,31" stroke="#C05808" stroke-width="2" stroke-linecap="round"/>
  <path d="M29,19 L28,29" stroke="#C05808" stroke-width="2" stroke-linecap="round"/>
  <path d="M35,19 L36,29" stroke="#C05808" stroke-width="2" stroke-linecap="round"/>
  <path d="M40,21 L42,31" stroke="#C05808" stroke-width="2" stroke-linecap="round"/>

  <!-- Left eye (open, heavy-lidded Garfield style) -->
  <ellipse cx="22" cy="36" rx="6" ry="5.5" fill="white"/>
  <ellipse cx="22" cy="37" rx="3.5" ry="4" fill="#4A9A20"/>
  <ellipse cx="22" cy="37" rx="2" ry="2.8" fill="#111"/>
  <circle cx="23.5" cy="34.5" r="1.2" fill="white"/>
  <!-- Droopy upper eyelid -->
  <path d="M16,33.5 Q22,29 28,33.5" fill="#E8720A"/>

  <!-- Pirate patch strap (goes around forehead) -->
  <path d="M35,31 Q33,25 30,20" stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M50,32 Q55,27 57,22" stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Pirate patch -->
  <ellipse cx="42" cy="36" rx="9" ry="7" fill="#111"/>
  <ellipse cx="40" cy="33.5" rx="4" ry="2.5" fill="#2A2A2A"/>

  <!-- Nose -->
  <ellipse cx="32" cy="47" rx="3" ry="2" fill="#CC3333"/>

  <!-- Mouth -->
  <path d="M27,51 Q32,55.5 37,51" fill="none" stroke="#993333" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="2" y1="45" x2="21" y2="47" stroke="#CCC" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="2" y1="49" x2="21" y2="50" stroke="#CCC" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="43" y1="47" x2="62" y2="45" stroke="#CCC" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="43" y1="50" x2="62" y2="49" stroke="#CCC" stroke-width="0.9" stroke-linecap="round"/>

</svg>
