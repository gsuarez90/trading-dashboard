AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Trading Dashboard — Lambda functions, DynamoDB, S3, CloudFront

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.13
    CodeUri: backend/
    Environment:
      Variables:
        # Non-secret config — SSM plain parameters
        PORTFOLIO_MODE:       !Sub '{{resolve:ssm:/trading-app/portfolio-mode}}'
        TRADING_MODE:         !Sub '{{resolve:ssm:/trading-app/trading-mode}}'
        PROFIT_MODE:          !Sub '{{resolve:ssm:/trading-app/profit-mode}}'
        TRADE_SCOPE:          !Sub '{{resolve:ssm:/trading-app/trade-scope}}'
        DAILY_GOAL:           !Sub '{{resolve:ssm:/trading-app/daily-goal}}'
        DAILY_LOSS_LIMIT:     !Sub '{{resolve:ssm:/trading-app/daily-loss-limit}}'
        DAILY_TRADE_LIMIT:    !Sub '{{resolve:ssm:/trading-app/daily-trade-limit}}'
        PDT_EXEMPT:           !Sub '{{resolve:ssm:/trading-app/PDT_EXEMPT}}'
        MAX_POSITION_SIZE_PCT: !Sub '{{resolve:ssm:/trading-app/max-position-size-pct}}'
        # API keys fetched from SSM SecureString at Lambda cold start (see ssm_service.py)
        # Infrastructure
        DYNAMO_TABLE_NAME:       trading-dashboard
        S3_CHARTS_BUCKET:        trading-dashboard-charts
        SCHWAB_TOKEN_SECRET_ARN: !Ref SchwabTokenSecret

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

  CreateOIDCProvider:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Set to false if a GitHub Actions OIDC provider already exists in this
      account (each AWS account can only have one per provider URL).

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, 'true']

Resources:

  # ── GitHub Actions OIDC deploy role ──────────────────────────────────────────

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: trading-dashboard-github-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
              StringLike:
                # Scoped to this repo only — any branch/ref
                'token.actions.githubusercontent.com:sub': 'repo:gsuarez90/trading-dashboard:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # ── DynamoDB ─────────────────────────────────────────────────────────────────

  TradingTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: trading-dashboard
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: trade_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: trade_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-date-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── Secrets Manager ───────────────────────────────────────────────────────────

  SchwabTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    Properties:
      Name: /trading-app/schwab-token
      Description: Schwab OAuth token JSON (written by schwab_auth.py, rotated automatically)
      # SecretString intentionally omitted — CloudFormation must not overwrite the live token on deploy.
      # Seed once after first deploy: aws secretsmanager put-secret-value --secret-id /trading-app/schwab-token --secret-string "$(cat backend/schwab_token.json)"

  RobinhoodSessionSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    Properties:
      Name: /trading-app/robinhood-session
      Description: Robinhood session token (base64 pickle) — written by Lambda after login, avoids device-approval on cold start
      # SecretString intentionally omitted — Lambda writes this after first login.

  # ── IAM shared policies ────────────────────────────────────────────────────────

  DynamoPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/trading-dashboard'
              - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/trading-dashboard/index/*'

  SchwabSecretsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:PutSecretValue
            Resource:
              - !Ref SchwabTokenSecret

  RobinhoodSecretsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/trading-app/robinhood-credentials*'
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:PutSecretValue
            Resource:
              - !Ref RobinhoodSessionSecret

  SsmApiKeysPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - kms:Decrypt
            Resource:
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/trading-app/anthropic-key'
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/trading-app/finnhub-key'
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/trading-app/schwab-client-id'
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/trading-app/schwab-client-secret'
              - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'

  # ── API Gateway ──────────────────────────────────────────────────────────────

  TradingHttpApi:
    Type: AWS::Serverless::HttpApi

  # ── Lambda functions ──────────────────────────────────────────────────────────

  # Main API — public Lambda (synthetic portfolio, no Robinhood IAM access)
  TradingDashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.handler
      Timeout: 120
      MemorySize: 1536
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - !Ref DynamoPolicy
        - !Ref SchwabSecretsPolicy
        - !Ref SsmApiKeysPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
            ApiId: !Ref TradingHttpApi

  # Private API — live Lambda (real Robinhood portfolio, x-api-key required)
  TradingDashboardPrivateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.handler
      Timeout: 120
      MemorySize: 1536
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          PORTFOLIO_MODE: live
          PRIVATE_API_KEY: !Sub '{{resolve:ssm:/trading-app/private-api-key}}'
      Policies:
        - !Ref DynamoPolicy
        - !Ref SchwabSecretsPolicy
        - !Ref RobinhoodSecretsPolicy
        - !Ref SsmApiKeysPolicy

  # Price monitor — every 1 min during market hours (9:00am–4:59pm ET = 13:00–20:59 UTC)
  PriceMonitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.price_monitor_handler
      Policies:
        - !Ref DynamoPolicy
        - !Ref SchwabSecretsPolicy
        - !Ref SsmApiKeysPolicy
      Events:
        MarketHours:
          Type: Schedule
          Properties:
            Schedule: cron(* 13-20 ? * MON-FRI *)

  # End of day — 3:45pm ET (20:45 UTC)
  EndOfDayFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.end_of_day_handler
      Policies:
        - !Ref DynamoPolicy
        - !Ref SchwabSecretsPolicy
        - !Ref SsmApiKeysPolicy
      Events:
        EOD:
          Type: Schedule
          Properties:
            Schedule: cron(45 20 ? * MON-FRI *)

  # Daily 9:35am ET refresh — scanner + sentiment + briefing → DynamoDB cache (13:35 UTC, Mon-Fri)
  # Runs after market open so _get_watchlist() returns live movers instead of _DEFAULT_TICKERS.
  DailyRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.refresh_handler
      Timeout: 120
      MemorySize: 1536
      Policies:
        - !Ref DynamoPolicy
        - !Ref SchwabSecretsPolicy
        - !Ref SsmApiKeysPolicy
      Events:
        DailyTrigger:
          Type: Schedule
          Properties:
            Schedule: cron(35 13 ? * MON-FRI *)

  # Daily 9:35am ET — live briefing for private URL (same cron, PORTFOLIO_MODE=live)
  DailyRefreshLiveBriefingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.refresh_live_briefing_handler
      Timeout: 120
      MemorySize: 1536
      Environment:
        Variables:
          PORTFOLIO_MODE: live
      Policies:
        - !Ref DynamoPolicy
        - !Ref SchwabSecretsPolicy
        - !Ref RobinhoodSecretsPolicy
        - !Ref SsmApiKeysPolicy
      Events:
        DailyTrigger:
          Type: Schedule
          Properties:
            Schedule: cron(35 13 ? * MON-FRI *)

  # Nightly analytics — Phase 2 (stub, not active)
  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: main.analytics_handler
      Timeout: 300
      MemorySize: 1024
      Policies:
        - !Ref DynamoPolicy
        - !Ref SsmApiKeysPolicy
      Events:
        NightlyAnalytics:
          Type: Schedule
          Properties:
            Schedule: cron(0 22 * * ? *)

  # ── S3 buckets ────────────────────────────────────────────────────────────────

  PublicFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: trading-dashboard-public
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  PrivateFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: trading-dashboard-private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  PrivateFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrivateFrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${PrivateFrontendBucket.Arn}/*'

  ChartsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: trading-dashboard-charts

  PublicFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PublicFrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${PublicFrontendBucket.Arn}/*'

  # ── CloudFront distributions ──────────────────────────────────────────────────

  PublicDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: PublicS3Origin
            DomainName: !GetAtt PublicFrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          TargetOriginId: PublicS3Origin
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  PrivateDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: PrivateS3Origin
            DomainName: !GetAtt PrivateFrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          TargetOriginId: PrivateS3Origin
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  FunctionUrl:
    Description: Public Lambda Function URL (no 29s ceiling) — use for PUBLIC_API_URL GitHub secret
    Value: !GetAtt TradingDashboardFunctionUrl.FunctionUrl
  PrivateFunctionUrl:
    Description: Private Lambda Function URL — use for PRIVATE_API_URL GitHub secret
    Value: !GetAtt TradingDashboardPrivateFunctionUrl.FunctionUrl
  ApiUrl:
    Description: API Gateway endpoint URL (legacy — kept for rollback; ceiling is 29s)
    Value: !Sub 'https://${TradingHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  PublicCloudfrontUrl:
    Description: Public CloudFront distribution URL
    Value: !Sub 'https://${PublicDistribution.DomainName}'
  PublicCloudfrontId:
    Description: Public CloudFront distribution ID — use for PUBLIC_CF_DIST_ID GitHub secret
    Value: !Ref PublicDistribution
  PrivateCloudfrontUrl:
    Description: Private CloudFront distribution URL
    Value: !Sub 'https://${PrivateDistribution.DomainName}'
  PrivateCloudfrontId:
    Description: Private CloudFront distribution ID — use for PRIVATE_CF_DIST_ID GitHub secret
    Value: !Ref PrivateDistribution
  DynamoTableName:
    Description: DynamoDB table name
    Value: trading-dashboard
  GitHubDeployRoleArn:
    Description: OIDC deploy role ARN — paste into AWS_DEPLOY_ROLE_ARN GitHub secret
    Value: !GetAtt GitHubDeployRole.Arn
